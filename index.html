function applyChroma(img) {
  const oc = document.createElement('canvas'); oc.width = img.naturalWidth || img.width; oc.height = img.naturalHeight || img.height;
  const octx = oc.getContext('2d'); octx.drawImage(img, 0, 0);
  const id = octx.getImageData(0, 0, oc.width, oc.height); const d = id.data;
  for (let i = 0; i < d.length; i += 4) { if (d[i]===CHROMA_R && d[i+1]===CHROMA_G && d[i+2]===CHROMA_B) d[i+3] = 0; }
  octx.putImageData(id, 0, 0); return oc;
}

function ot(n) { const k = OTO[n]; if (!k||!SND[k]) return; try { const a = SND[k]; a.volume=0.6; a.currentTime=0; a.play().catch(()=>{}); } catch(e) {} }

function setupGrap() {

  for(let i=0;i<=6;i++){ G(i,1,'brock',33*i,0,30,30); G(i+30,1,'brock',33*i,33,30,30); G(i+60,1,'brock',33*i,66,30,30); } G(8,1,'brock',33*7,0,30,30); G(16,1,'item',33*6,0,24,27);

  for(let i=0;i<=7;i++) G(i,2,'item',33*i,0,30,30); G(0,5,'omake',167,0,45,45);
  G(0,3,'teki',33*0,0,30,30); G(1,3,'teki',33*1,0,30,43); G(2,3,'teki',33*2,0,30,30); G(3,3,'teki',33*3,0,30,44); G(4,3,'teki',33*4,0,33,35); G(5,3,'omake2',0,0,37,55); G(6,3,'omake2',38*2,0,36,50); G(150,3,'omake2',38*2+37*2,0,36,50); G(7,3,'teki',33*6+1,0,32,32); G(8,3,'omake2',38*2+37*3,0,37,47); G(151,3,'omake2',38*3+37*3,0,37,47); G(9,3,'teki',33*7+1,0,26,30); G(10,3,'omake',214,0,46,16); G(30,3,'omake2',0,56,30,36); G(155,3,'omake2',31*3,56,30,36); G(31,3,'omake',50,74,49,79); G(80,3,'haikei',151,31,70,40); G(81,3,'haikei',151,72,70,40); G(130,3,'haikei',151+71,72,70,40); G(82,3,'brock2',33*1,0,30,30); G(83,3,'omake',0,0,49,48); G(84,3,'teki',33*5+1,0,30,30); G(86,3,'omake',102,66,49,59); G(152,3,'omake',152,66,49,59); G(90,3,'omake',102,0,64,63); G(100,3,'item',33*1,0,30,30); G(101,3,'item',33*7,0,30,30); G(102,3,'item',33*3,0,30,30); G(105,3,'item',33*5,0,30,30); G(110,3,'item',33*4,0,30,30);

function setcolor(r,g,b){ drawColor=`rgb(${r},${g},${b})`; }
function setc0(){ drawColor='rgb(0,0,0)'; } function setc1(){ drawColor='rgb(255,255,255)'; }

function drawarc(x,y,rx,ry){ ctx.strokeStyle=drawColor; ctx.lineWidth=1; ctx.beginPath(); ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2); ctx.stroke(); }

function drawimage(gid, gtype, dx, dy) {
  const def = grapDef[gid] && grapDef[gid][gtype]; if (!def) return;
  const idx = Math.floor(dx), idy = Math.floor(dy);
  if (gtype===6) { const src = IMG[def.imgKey]; if (!src) return; ctx.imageSmoothingEnabled = false; ctx.drawImage(src, idx, idy); return; }
  const src = IMG[def.imgKey]; if (!src) return; const {sx,sy,sw,sh} = def; if (sw<=0||sh<=0) return;
  ctx.save(); ctx.imageSmoothingEnabled = false;
  if (mirror) { ctx.translate(idx+sw, idy); ctx.scale(-1,1); ctx.drawImage(src, sx,sy,sw,sh, 0,0,sw,sh); } else { ctx.drawImage(src, sx,sy,sw,sh, idx,idy,sw,sh); }
  ctx.restore();
}
function DrawRotaGraph(cx,cy, scale, angle, gid, gtype) {
  const def = grapDef[gid] && grapDef[gid][gtype]; if(!def)return; const src = IMG[def.imgKey]; if(!src)return; const {sx,sy,sw,sh}=def;
  ctx.save(); ctx.imageSmoothingEnabled = false; ctx.translate(Math.floor(cx), Math.floor(cy)); ctx.rotate(angle); ctx.scale(scale,scale); ctx.drawImage(src,sx,sy,sw,sh,-sw/2,-sh/2,sw,sh); ctx.restore();
}
function str(text,x,y,size=20) { ctx.fillStyle=drawColor; ctx.font=`bold ${size}px monospace`; ctx.fillText(text,x,y+size); }

const KEY={};
let any_key_pushed = false;

document.addEventListener('keydown', e => { 
    KEY[e.code]=true; 
    // ShiftとAlt "以外" のキーが新しく押された瞬間にフラグを立てる (CtrlやWinキーも含む)
    if (e.key !== 'Shift' && e.key !== 'Alt' && !e.repeat) {
        any_key_pushed = true;
    }
    if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','KeyZ','KeyO','Enter'].includes(e.code)) e.preventDefault(); 
});
document.addEventListener('keyup', e => { KEY[e.code]=false; });

// マウスのクリック（左・中・右クリック）でも反応させる
document.addEventListener('mousedown', () => {
    any_key_pushed = true;
});

// ============================================================
// メイン処理
// ============================================================

    // C++関数のバインド

        get_tmsgtype: Module.cwrap('get_tmsgtype', 'number',[]), get_tmsgy: Module.cwrap('get_tmsgy', 'number',[]), get_tmsg: Module.cwrap('get_tmsg', 'number',[]),

        get_player_x: Module.cwrap('get_player_x', 'number',[]), get_player_y: Module.cwrap('get_player_y', 'number',[]),
        get_player_muki: Module.cwrap('get_player_muki', 'number',[]), get_player_act: Module.cwrap('get_player_act', 'number',[]),
        get_player_type: Module.cwrap('get_player_type', 'number',[]), get_player_mzimen: Module.cwrap('get_player_mzimen', 'number',[]), get_player_mnobia: Module.cwrap('get_player_mnobia', 'number',[]),

        get_enem_max: Module.cwrap('get_enem_max', 'number',[]), get_enem_aa: Module.cwrap('get_enem_aa', 'number',[]), get_enem_ab: Module.cwrap('get_enem_ab', 'number',[]),

        get_enem_ad: Module.cwrap('get_enem_ad', 'number',[]), get_enem_amsgtm: Module.cwrap('get_enem_amsgtm', 'number',[]), get_enem_amsgtype: Module.cwrap('get_enem_amsgtype', 'number',[]),

        get_block_max: Module.cwrap('get_block_max', 'number',[]), get_block_ta: Module.cwrap('get_block_ta', 'number',[]), get_block_tb: Module.cwrap('get_block_tb', 'number',[]),
        get_block_ttype: Module.cwrap('get_block_ttype', 'number',[]), get_block_txtype: Module.cwrap('get_block_txtype', 'number',[]),

        get_effect_max: Module.cwrap('get_effect_max', 'number',[]), get_effect_ea: Module.cwrap('get_effect_ea', 'number',[]), get_effect_eb: Module.cwrap('get_effect_eb', 'number',[]),
        get_effect_enobia: Module.cwrap('get_effect_enobia', 'number',[]), get_effect_enobib: Module.cwrap('get_effect_enobib', 'number',[]), get_effect_egtype: Module.cwrap('get_effect_egtype', 'number',[]), get_effect_etm: Module.cwrap('get_effect_etm', 'number',[]),

        get_bg_max: Module.cwrap('get_bg_max', 'number',[]), get_bg_na: Module.cwrap('get_bg_na', 'number',[]), get_bg_nb: Module.cwrap('get_bg_nb', 'number',[]), get_bg_ntype: Module.cwrap('get_bg_ntype', 'number',[]),

        get_s_max: Module.cwrap('get_s_max', 'number',[]), get_s_sa: Module.cwrap('get_s_sa', 'number',[]), get_s_sb: Module.cwrap('get_s_sb', 'number',[]),
        get_s_sc: Module.cwrap('get_s_sc', 'number',[]), get_s_sd: Module.cwrap('get_s_sd', 'number',[]), get_s_stype: Module.cwrap('get_s_stype', 'number',[]), get_s_sxtype: Module.cwrap('get_s_sxtype', 'number',[]),

        get_sr_max: Module.cwrap('get_sr_max', 'number',[]), get_sr_sra: Module.cwrap('get_sr_sra', 'number',[]), get_sr_srb: Module.cwrap('get_sr_srb', 'number',[]),
        get_sr_src: Module.cwrap('get_sr_src', 'number',[]), get_sr_srsp: Module.cwrap('get_sr_srsp', 'number',[]),

        get_play_bgm: Module.cwrap('get_play_bgm', 'number',[]), get_play_se: Module.cwrap('get_play_se', 'number',[]), get_stop_bgm: Module.cwrap('get_stop_bgm', 'number',[]),
        get_xx: Module.cwrap('get_xx', 'number',[]), get_mainmsgtype: Module.cwrap('get_mainmsgtype', 'number',[])
    };

    CF.init_game();
    let lastT = 0, walkAnimCounter = 0; 

    function gameLoop(now) {
        requestAnimationFrame(gameLoop);
        const fps = KEY['Space'] ? 60 : 30;
        if(now - lastT < (1000/fps) - 2) return;
        lastT = now;

        // set_key_state の第1引数に any_key_pushed を渡し、その後フラグを消費する
        CF.set_key_state(any_key_pushed ? 1 : 0, KEY['ArrowLeft']?1:0, KEY['ArrowRight']?1:0, KEY['ArrowUp']||KEY['KeyZ']?1:0, KEY['ArrowDown']?1:0, KEY['KeyZ']?1:0, KEY['F1']?1:0, KEY['KeyO']?1:0, KEY['Enter']?1:0, KEY['Space']?1:0, KEY['Digit1']?1:0, KEY['Digit2']?1:0, KEY['Digit3']?1:0, KEY['Digit4']?1:0, KEY['Digit0']?1:0);
        any_key_pushed = false;

        let se = CF.get_play_se(); if(se !== -1) ot(se);

                if(ntype[i]===102) { setc1(); str('プレイしてくれてありがとー', nx, ny); }
            }

            const emax = CF.get_effect_max(); const ea = getArr(CF.get_effect_ea, emax), eb = getArr(CF.get_effect_eb, emax), enobia = getArr(CF.get_effect_enobia, emax), enobib = getArr(CF.get_effect_enobib, emax), egtype = getArr(CF.get_effect_egtype, emax), etm = getArr(CF.get_effect_etm, emax);
            for(let i=0; i<emax; i++){

            }

            const srmax = CF.get_sr_max(); const sra = getArr(CF.get_sr_sra, srmax), srb = getArr(CF.get_sr_srb, srmax), src = getArr(CF.get_sr_src, srmax), srsp = getArr(CF.get_sr_srsp, srmax);
            for(let i=0; i<srmax; i++){
                if(sra[i]<=-9e5) continue; const srx=(sra[i]-fx)/100, sry=(srb[i]-fy)/100, srw=src[i]/100, sp = srsp[i];
                if(sp<=9||sp>=20){ setcolor(sp===2?0:sp===21?180:220, sp===2?220:sp===21?180:220, sp===2?0:sp===21?180:0); fillrect(srx,sry,srw,sp===1?12:14); setcolor(sp===2?0:sp===21?150:180, sp===2?180:sp===21?150:180, sp===2?0:sp===21?150:0); drawrect(srx,sry,srw,sp===1?12:14); }
                else if(sp<=14){ if(src[i]>=5000){ setcolor(0,200,0);fillrect(srx,sry,srw,30);setcolor(0,160,0);drawrect(srx,sry,srw,30); setcolor(180,120,60);fillrect(srx+20,sry+30,srw-40,480);setcolor(100,80,20);drawrect(srx+20,sry+30,srw-40,480); } }
                else if(sp===15){ for(let t2=0;t2<=2;t2++) drawimage(1,1,srx+t2*29,sry); }
            }

            const mtype = CF.get_player_type(); mirror = CF.get_player_muki() === 0 ? 1 : 0;
            if(KEY['ArrowLeft'] || KEY['ArrowRight']) walkAnimCounter++; const mact = Math.floor(walkAnimCounter / 6) % 2;
            
            // 【逆走バグ修正】 playerの座標は fx を引かない（C++側ですでに画面座標になっている）
            if(mtype!==200 && mtype!==1){ drawimage(CF.get_player_mzimen()===1 ? mact : 2, 0, CF.get_player_x()/100, CF.get_player_y()/100); }

            mirror = 0;

            const amax = CF.get_enem_max(); const aa = getArr(CF.get_enem_aa, amax), ab = getArr(CF.get_enem_ab, amax), anobia = getArr(CF.get_enem_anobia, amax), anobib = getArr(CF.get_enem_anobib, amax), atype = getArr(CF.get_enem_atype, amax), axtype = getArr(CF.get_enem_axtype, amax), amuki = getArr(CF.get_enem_amuki, amax), atm = getArr(CF.get_enem_atm, amax), ad = getArr(CF.get_enem_ad, amax);
            for(let i=0; i<amax; i++) {
                if(aa[i]<=-9e5) continue; const ax = (aa[i]-fx)/100, ay = (ab[i]-fy)/100, at = atype[i];
                if(amuki[i]===1) mirror=1;
                if(at===3 && axtype[i]===1) { DrawRotaGraph(ax+13,ay+15,1,pai,3,3); mirror=0; continue; }
                if(at===9 && ad[i]>=1) { DrawRotaGraph(ax+13,ay+15,1,pai,9,3); mirror=0; continue; }
                if(at>=100 && amuki[i]===1) mirror=0;
                if(at<200 && at!==6 && at!==79 && at!==86 && at!==30){ if(!((at===80||at===81) && axtype[i]===1)) drawimage(at, 3, ax, ay); }
                if(at===6){ if((atm[i]>=10&&atm[i]<=19)||(atm[i]>=100&&atm[i]<=119)||atm[i]>=200) drawimage(150,3,ax,ay); else drawimage(6,3,ax,ay); }
                if(at===30) { if(axtype[i]===0) drawimage(30,3,ax,ay); else drawimage(155,3,ax,ay); }
